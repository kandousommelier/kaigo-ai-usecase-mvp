<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>運営者用管理画面｜介護現場 AI活用計画づくり</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/admin.js" defer></script>
</head>
<body class="admin-body">
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">AI</span><span>介護現場 AI活用計画づくり</span></a>
    <span class="header-note">運営者用管理画面</span>
  </header>

  <main class="admin-shell">
    <section class="login-card" id="login-screen" aria-labelledby="login-title">
      <p class="eyebrow">ADMINISTRATION</p>
      <h1 id="login-title">運営者ログイン</h1>
      <p>Supabaseで作成した運営者アカウントを入力してください。</p>
      <form id="login-form">
        <label>メールアドレス<input type="email" name="email" autocomplete="username" required></label>
        <label>パスワード<input type="password" name="password" autocomplete="current-password" required></label>
        <button type="submit" class="primary-button">ログイン</button>
      </form>
      <p class="form-message" id="login-message" role="alert"></p>
      <div class="notice" id="admin-config-notice" hidden>
        <h2>Supabaseの設定が必要です</h2>
        <p><code>js/config.js</code>へSupabase URLとAnon Keyを設定してください。</p>
      </div>
    </section>

    <section id="admin-screen" hidden>
      <div class="admin-heading">
        <div>
          <p class="eyebrow">SUBMITTED PLANS</p>
          <h1>届いたAI活用計画</h1>
          <p>計画書をコピーした後、定期的に削除してください。</p>
        </div>
        <div class="admin-heading-actions">
          <button type="button" class="secondary-button" id="refresh-button">最新の情報に更新</button>
          <button type="button" class="secondary-button" id="logout-button">ログアウト</button>
        </div>
      </div>

      <div class="admin-summary">
        <article><span>未確認</span><strong id="new-count">0</strong></article>
        <article><span>確認済み</span><strong id="reviewed-count">0</strong></article>
        <article><span>合計</span><strong id="total-count">0</strong></article>
      </div>

      <div class="admin-toolbar">
        <div class="filter-buttons" role="group" aria-label="表示する計画">
          <button type="button" class="filter-button is-active" data-filter="all">すべて</button>
          <button type="button" class="filter-button" data-filter="new">未確認</button>
          <button type="button" class="filter-button" data-filter="reviewed">確認済み</button>
        </div>
        <button type="button" class="danger-button" id="delete-reviewed-button">確認済みを一括削除</button>
      </div>

      <p class="admin-status" id="admin-status" role="status" aria-live="polite"></p>
      <div class="submission-list" id="submission-list"></div>
      <div class="empty-state" id="submission-empty" hidden><h2>表示する計画書はありません</h2><p>条件を変更するか、最新の情報に更新してください。</p></div>
    </section>
  </main>

  <dialog class="detail-dialog" id="detail-dialog" aria-labelledby="detail-title">
    <div class="detail-frame">
      <button type="button" class="dialog-close" id="detail-close" aria-label="詳細を閉じる">×</button>
      <div id="detail-content"></div>
    </div>
  </dialog>
</body>
</html>
